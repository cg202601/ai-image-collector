<!DOCTYPE html>
<html data-theme="<?= theme ?>">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI 图片作品库</title>
  <style>
    :root[data-theme="light"]{
      --bg:#f7f8fa;--panel:#ffffff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--accent:#2563eb;
      --like:#ef4444;--fav:#f59e0b;
    }
    :root[data-theme="dark"]{
      --bg:#0b1220;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#334155;--accent:#60a5fa;
      --like:#fb7185;--fav:#fbbf24;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;background:var(--bg);color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    }
    .wrap{max-width:1500px;margin:0 auto;padding:14px}
    .toolbar{
      position:sticky;top:0;z-index:30;display:flex;gap:8px;align-items:center;flex-wrap:wrap;
      padding:12px;border:1px solid var(--line);border-radius:14px;background:var(--panel);
    }
    .input,.select,.btn,.chip-btn{
      height:38px;border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:10px;
    }
    .input{padding:0 12px;min-width:240px;flex:1}
    .select{padding:0 10px}
    .btn,.chip-btn{padding:0 12px;cursor:pointer}
    .btn:hover,.chip-btn:hover{border-color:var(--accent)}
    .btn.active{border-color:var(--accent);color:var(--accent)}
    .meta{font-size:12px;color:var(--muted)}

    .tagbox{margin-top:10px;border:1px solid var(--line);border-radius:12px;background:var(--panel);overflow:hidden}
    .tagbox-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px}
    .tagbox-body{padding:0 12px 12px;display:none}
    .tagbox.open .tagbox-body{display:block}
    .tag-group{margin-top:8px}
    .tag-label{font-size:12px;color:var(--muted);margin-bottom:6px}
    .tags{display:flex;flex-wrap:wrap;gap:6px}
    .tag{height:28px;padding:0 10px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--text);cursor:pointer}
    .tag.active{border-color:var(--accent);color:var(--accent)}

    .gallery{margin-top:14px;columns:300px;column-gap:12px}
    .card{
      break-inside:avoid;margin-bottom:12px;border:1px solid var(--line);border-radius:12px;background:var(--panel);overflow:hidden;
      cursor:pointer;transition:transform .15s ease,box-shadow .15s ease;
    }
    .card:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(0,0,0,.12)}
    .thumb{width:100%;display:block;background:#0f172a}
    .body{padding:10px}
    .name{font-size:13px;font-weight:600;line-height:1.4;word-break:break-all}
    .chips{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
    .chip{font-size:11px;color:var(--muted);padding:2px 8px;border:1px solid var(--line);border-radius:999px}
    .prompt{
      margin-top:8px;font-size:12px;line-height:1.5;color:var(--muted);
      display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word;
    }
    .react{margin-top:10px;display:flex;gap:6px;align-items:center}
    .react-btn{border:1px solid var(--line);height:28px;border-radius:999px;background:transparent;color:var(--muted);cursor:pointer;padding:0 8px;font-size:12px}
    .react-btn.on.like{color:var(--like);border-color:var(--like)}
    .react-btn.on.fav{color:var(--fav);border-color:var(--fav)}
    .stat-pill{height:28px;border:1px solid var(--line);border-radius:999px;color:var(--muted);padding:0 8px;display:inline-flex;align-items:center;font-size:12px;flex:0 0 auto;white-space:nowrap}
    .card-tools{
      margin-top:8px;
      display:flex;
      gap:6px;
      align-items:center;
      flex-wrap:wrap;
      white-space:normal;
      overflow:visible;
    }
    .tool-btn{
      border:1px solid var(--line);
      height:28px;
      border-radius:999px;
      background:transparent;
      color:var(--muted);
      cursor:pointer;
      padding:0 8px;
      font-size:12px;
      flex:0 0 auto;
    }
    .tool-btn:hover{border-color:var(--accent);color:var(--accent)}
    .card-actions{margin-top:10px}
    .card-actions .react-btn{
      margin:0;
      flex:0 0 auto;
      white-space:nowrap;
    }
    #loader{padding:28px;text-align:center;color:var(--muted)}

    .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:99}
    .lb-wrap{
      height:100dvh;display:grid;grid-template-columns:minmax(0,1fr) 380px;gap:12px;padding:12px;
      transition:grid-template-columns .2s ease;align-items:stretch;
    }
    .lb-wrap.hide-side{grid-template-columns:minmax(0,1fr) 0}
    .lb-media{
      position:relative;background:#000;border-radius:12px;overflow:hidden;
      display:flex;align-items:center;justify-content:center;
      min-height:0;height:100%;
    }
    #lbMedia{
      width:100%;height:100%;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden;
    }
    .lb-image{
      max-width:100%;max-height:100%;object-fit:contain;transform-origin:center center;transition:transform .15s ease;
      display:block;user-select:none;-webkit-user-drag:none;
    }
    .lb-video{max-width:100%;max-height:100%;object-fit:contain}
    .lb-side{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;overflow:auto;min-width:0;min-height:0}
    .lb-title{font-size:16px;font-weight:700;margin-bottom:8px}
    .lb-row{margin-bottom:10px}
    .lb-label{font-size:12px;color:var(--muted);margin-bottom:4px}
    .lb-value{font-size:13px;line-height:1.6;word-break:break-word;white-space:pre-wrap}
    .lb-actions{display:flex;gap:8px;flex-wrap:wrap}
    .similar-list{display:grid;gap:8px}
    .similar-item{display:grid;grid-template-columns:54px 1fr;gap:8px;align-items:center;border:1px solid var(--line);border-radius:10px;padding:6px;cursor:pointer}
    .similar-item:hover{border-color:var(--accent)}
    .similar-thumb{width:54px;height:54px;object-fit:cover;border-radius:8px;background:#0f172a}
    .similar-name{font-size:12px;font-weight:600;line-height:1.35;word-break:break-all}
    .similar-meta{font-size:11px;color:var(--muted);margin-top:3px}
    .lb-actions-top{
      position:sticky;
      top:0;
      z-index:3;
      background:var(--panel);
      padding-bottom:8px;
      margin-bottom:8px;
      border-bottom:1px solid var(--line);
    }
    .lb-float{position:absolute;top:12px;left:12px;display:flex;gap:8px;z-index:4}
    .lb-btn{
      height:34px;padding:0 10px;border:1px solid rgba(255,255,255,.25);border-radius:9px;background:rgba(15,23,42,.55);
      color:#fff;cursor:pointer;
    }
    .lb-btn:hover{border-color:#fff}
    .close{position:absolute;right:12px;top:8px;color:#fff;font-size:40px;cursor:pointer;z-index:5;line-height:1}
    .nav{
      position:absolute;top:50%;transform:translateY(-50%);z-index:5;
      color:#fff;font-size:36px;line-height:1;cursor:pointer;padding:8px 12px;
      background:rgba(15,23,42,.35);border:1px solid rgba(255,255,255,.25);border-radius:10px;user-select:none;
    }
    .nav.prev{left:8px}
    .nav.next{right:8px}
    .toast{
      position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:rgba(15,23,42,.88);color:#fff;
      padding:8px 12px;border-radius:10px;font-size:12px;display:none;z-index:120;
    }

    body.embed-mode .wrap{max-width:none;padding:10px}
    body.embed-mode .lightbox{width:100vw;height:100dvh}
    body.embed-mode .lb-wrap{height:100dvh;padding:8px}

    @media (max-width:980px){
      .gallery{columns:1}
      .lb-wrap,.lb-wrap.hide-side{grid-template-columns:1fr}
      .lb-side{max-height:45vh}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="toolbar">
      <input id="q" class="input" placeholder="搜索：文件名 / 提示词 / 软件 / 分类 / 备注">
      <select id="sortKey" class="select">
        <option value="date">按时间</option>
        <option value="name">按名称</option>
        <option value="likes">按点赞</option>
        <option value="favorites">按收藏</option>
        <option value="copies">按复制</option>
      </select>
      <select id="sortDir" class="select">
        <option value="desc">降序</option>
        <option value="asc">升序</option>
      </select>
      <button class="btn" onclick="toggleTheme()">主题</button>
      <button id="filterFavBtn" class="btn" onclick="setQuickFilter('favorites')">只看收藏</button>
      <button id="filterLikeBtn" class="btn" onclick="setQuickFilter('liked')">只看点赞</button>
      <button id="randomBtn" class="btn" onclick="showRandomInspiration()">随机灵感</button>
      <button id="clearViewBtn" class="btn" onclick="clearViewMode()">全部</button>
      <div class="meta" id="metaInfo">加载中...</div>
    </div>

    <div id="tagBox" class="tagbox">
      <div class="tagbox-head">
        <strong>标签检索</strong>
        <div>
          <button class="chip-btn" onclick="toggleTagBox()">折叠/展开</button>
          <button class="chip-btn" onclick="clearTagFilter()">清空标签</button>
        </div>
      </div>
      <div id="tagBody" class="tagbox-body"></div>
    </div>

    <div id="loader">正在同步云端数据...</div>
    <div id="gallery" class="gallery"></div>
  </div>

  <div id="lightbox" class="lightbox" onclick="if(event.target===this)closeLightbox()">
    <div class="close" onclick="closeLightbox()">×</div>
    <div class="nav prev" onclick="prevItem()">&lsaquo;</div>
    <div class="nav next" onclick="nextItem()">&rsaquo;</div>
    <div id="lbWrap" class="lb-wrap">
      <div class="lb-media">
        <div class="lb-float">
          <button class="lb-btn" onclick="toggleSidePanel()">详情</button>
          <button class="lb-btn" onclick="zoomOut()">-</button>
          <button class="lb-btn" onclick="zoomReset()">100%</button>
          <button class="lb-btn" onclick="zoomIn()">+</button>
          <button class="lb-btn" onclick="openStandalone()">新窗</button>
        </div>
        <div id="lbMedia"></div>
      </div>
      <div id="lbSide" class="lb-side">
        <div id="lbTitle" class="lb-title"></div>
        <div class="lb-actions lb-actions-top">
          <button class="btn" onclick="copyPrompt()">复制提示词</button>
          <button class="btn" onclick="openRaw()">打开原图</button>
          <button class="btn" onclick="downloadRaw()">下载</button>
        </div>
        <div class="lb-row lb-actions-top" style="padding-top:8px;">
          <div class="lb-label">互动</div>
          <div class="react">
            <button id="lbLikeBtn" class="react-btn" onclick="toggleCurrentLike(event)">👍 0</button>
            <button id="lbFavBtn" class="react-btn" onclick="toggleCurrentFav(event)">⭐ 0</button>
            <span id="lbCopyCount" class="stat-pill">复制 0</span>
          </div>
        </div>
        <div class="lb-row"><div class="lb-label">提示词</div><div id="lbPrompt" class="lb-value"></div></div>
        <div class="lb-row"><div class="lb-label">备注</div><div id="lbNote" class="lb-value"></div></div>
        <div class="lb-row"><div class="lb-label">软件 / 分类</div><div id="lbSC" class="lb-value"></div></div>
        <div class="lb-row"><div class="lb-label">来源</div><div id="lbSource" class="lb-value"></div></div>
        <div class="lb-row"><div class="lb-label">文件夹路径</div><div id="lbPath" class="lb-value"></div></div>
        <div class="lb-row"><div class="lb-label">最后修改</div><div id="lbDate" class="lb-value"></div></div>
        <div class="lb-row"><div class="lb-label">相似作品</div><div id="lbSimilar" class="similar-list"></div></div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    let allData = [];
    let viewData = [];
    let currentIndex = 0;
    let currentZoom = 1;
    let sideVisible = true;
    let selectedTags = [];
    let tagCloud = [];
    let quickFilter = 'all';
    let randomMode = false;
    let randomNonce = 0;
    let randomSeed = 1;
    let lastScrollY = 0;
    const imageDataCache = {};
    const pendingImageReq = {};
    let thumbObserver = null;

    const FID = "<?= fid ?>";
    const SID = "<?= sid ?>";
    const WEB_APP_URL = "<?= webAppUrl ?>";
    const USER_ID_KEY = 'ai_gallery_user_id';
    const isEmbedded = (window.top !== window.self) || /sites\.google\.com/i.test(document.referrer || '');
    if (isEmbedded) document.body.classList.add('embed-mode');
    if (isEmbedded) sideVisible = false;

    function getOrCreateUserId() {
      let v = localStorage.getItem(USER_ID_KEY);
      if (!v) {
        v = 'u_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
        localStorage.setItem(USER_ID_KEY, v);
      }
      return v;
    }
    const userId = getOrCreateUserId();

    const savedTheme = localStorage.getItem('gallery_theme') || (document.documentElement.getAttribute('data-theme') || 'light');
    document.documentElement.setAttribute('data-theme', savedTheme);

    function esc(s){ return String(s || '').replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
    function escJs(s){ return String(s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }
    function showToast(msg){
      const t = document.getElementById('toast');
      t.textContent = msg; t.style.display = 'block';
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => { t.style.display = 'none'; }, 1800);
    }

    function transparentPixel() {
      return 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';
    }

    function safeFileName(name, fallbackExt) {
      const n = String(name || '').trim();
      if (!n) return 'image.' + (fallbackExt || 'jpg');
      return n.replace(/[\\/:*?"<>|]+/g, '_');
    }

    function imagePayloadToDataUri(payload) {
      if (!payload || !payload.base64) return '';
      const mime = payload.mimeType || 'image/jpeg';
      return 'data:' + mime + ';base64,' + payload.base64;
    }

    function getImageDataCached(fileId, maxSide) {
      const key = String(fileId) + ':' + String(maxSide || 0);
      if (imageDataCache[key]) return Promise.resolve(imageDataCache[key]);
      if (pendingImageReq[key]) return pendingImageReq[key];

      pendingImageReq[key] = new Promise((resolve, reject) => {
        google.script.run.withSuccessHandler(function(raw){
          delete pendingImageReq[key];
          let resp = {};
          try { resp = JSON.parse(raw || '{}'); } catch (e) {}
          if (!resp.success) {
            reject(new Error(resp.error || 'getImageData failed'));
            return;
          }
          const dataUri = imagePayloadToDataUri(resp);
          imageDataCache[key] = dataUri;
          resolve(dataUri);
        }).withFailureHandler(function(err){
          delete pendingImageReq[key];
          reject(err);
        }).getImageData(fileId, maxSide || 0);
      });

      return pendingImageReq[key];
    }

    function hydrateThumbs() {
      const imgs = document.querySelectorAll('img.thumb[data-file-id]');
      if (!imgs.length) return;

      const loadOne = (img) => {
        const fileId = img.getAttribute('data-file-id');
        const fallbackSrc = img.getAttribute('data-fallback-src') || '';
        if (!fileId || img.getAttribute('data-loaded') === '1') return;
        img.setAttribute('data-loaded', '1');
        getImageDataCached(fileId, 680)
          .then((dataUri) => { img.src = dataUri || transparentPixel(); })
          .catch(() => { img.src = fallbackSrc || transparentPixel(); });
      };

      if ('IntersectionObserver' in window) {
        if (thumbObserver) thumbObserver.disconnect();
        thumbObserver = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              loadOne(entry.target);
              thumbObserver.unobserve(entry.target);
            }
          });
        }, { rootMargin: '220px' });
        imgs.forEach((img) => thumbObserver.observe(img));
      } else {
        imgs.forEach(loadOne);
      }
    }
    function toggleTheme() {
      const cur = document.documentElement.getAttribute('data-theme') || 'light';
      const next = cur === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('gallery_theme', next);
    }

    function toggleTagBox() { document.getElementById('tagBox').classList.toggle('open'); }
    function clearTagFilter() { selectedTags = []; applyFilterSortRender(); renderTagCloud(); }
    function setQuickFilter(mode) {
      quickFilter = quickFilter === mode ? 'all' : mode;
      randomMode = false;
      applyFilterSortRender();
    }
    function showRandomInspiration() {
      randomMode = true;
      quickFilter = 'all';
      randomNonce++;
      randomSeed = Date.now() + randomNonce;
      applyFilterSortRender();
      showToast('已随机挑选一组灵感');
    }
    function clearViewMode() {
      quickFilter = 'all';
      randomMode = false;
      applyFilterSortRender();
    }
    function updateModeButtons() {
      const fav = document.getElementById('filterFavBtn');
      const liked = document.getElementById('filterLikeBtn');
      const random = document.getElementById('randomBtn');
      const clear = document.getElementById('clearViewBtn');
      if (fav) fav.classList.toggle('active', quickFilter === 'favorites');
      if (liked) liked.classList.toggle('active', quickFilter === 'liked');
      if (random) random.classList.toggle('active', randomMode);
      if (clear) clear.classList.toggle('active', quickFilter === 'all' && !randomMode);
    }
    function seededShuffle(list, seed) {
      const arr = list.slice();
      let s = seed || 1;
      function rnd() {
        s = (s * 1664525 + 1013904223) % 4294967296;
        return s / 4294967296;
      }
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(rnd() * (i + 1));
        const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
      }
      return arr;
    }

    function loadData() {
      google.script.run.withSuccessHandler(function(raw){
        const loader = document.getElementById('loader');
        loader.style.display = 'none';
        let resp = {};
        try { resp = JSON.parse(raw || '{}'); } catch (e) {}
        if (!resp.success) {
          loader.style.display = 'block';
          loader.textContent = resp.error || '加载失败';
          return;
        }
        allData = resp.data || [];
        tagCloud = resp.tagCloud || [];
        renderTagCloud();
        applyFilterSortRender();
      }).getFilesData(FID, {
        recursive: true, includeVideos: true, maxItems: 3000, maxComments: 20,
        spreadsheetId: SID, userId: userId
      });
    }

    function renderTagCloud() {
      const body = document.getElementById('tagBody');
      if (!tagCloud.length) {
        body.innerHTML = '<div class="meta">暂无标签字典（请在表格 TagCloud 中配置）</div>';
        return;
      }
      let html = '';
      tagCloud.forEach(group => {
        html += '<div class="tag-group"><div class="tag-label">' + esc(group.label) + '</div><div class="tags">';
        (group.tags || []).forEach(tag => {
          const on = selectedTags.indexOf(tag) > -1 ? ' active' : '';
          html += '<button class="tag' + on + '" onclick="toggleTag(\'' + escJs(tag) + '\')">' + esc(tag) + '</button>';
        });
        html += '</div></div>';
      });
      body.innerHTML = html;
    }

    function toggleTag(tag) {
      const i = selectedTags.indexOf(tag);
      if (i > -1) selectedTags.splice(i, 1);
      else selectedTags.push(tag);
      applyFilterSortRender();
      renderTagCloud();
    }

    function applyFilterSortRender() {
      const q = (document.getElementById('q').value || '').trim().toLowerCase();
      const sortKey = document.getElementById('sortKey').value;
      const sortDir = document.getElementById('sortDir').value;

      viewData = allData.filter(x => {
        const text = [x.name, x.prompt, x.note, x.software, x.category, x.folderPath].join(' ').toLowerCase();
        if (q && text.indexOf(q) < 0) return false;
        if (quickFilter === 'favorites' && !x.favoritedByMe) return false;
        if (quickFilter === 'liked' && !x.likedByMe) return false;
        if (selectedTags.length) {
          for (let i = 0; i < selectedTags.length; i++) {
            if (text.indexOf(String(selectedTags[i]).toLowerCase()) < 0) return false;
          }
        }
        return true;
      });

      if (randomMode) {
        viewData = seededShuffle(viewData, randomSeed).slice(0, Math.min(18, viewData.length));
      } else {
        viewData.sort((a, b) => {
          let r = 0;
          if (sortKey === 'name') r = String(a.name || '').localeCompare(String(b.name || ''), 'zh-CN');
          else if (sortKey === 'likes') r = Number(a.likes || 0) - Number(b.likes || 0);
          else if (sortKey === 'favorites') r = Number(a.favorites || 0) - Number(b.favorites || 0);
          else if (sortKey === 'copies') r = Number(a.copies || 0) - Number(b.copies || 0);
          else r = Number(a.date || 0) - Number(b.date || 0);
          return sortDir === 'desc' ? -r : r;
        });
      }

      renderGallery();
      updateModeButtons();
      document.getElementById('metaInfo').textContent = (randomMode ? '随机灵感 ' : '筛选后 ') + viewData.length + ' / 总计 ' + allData.length;
    }

    function renderGallery() {
      const box = document.getElementById('gallery');
      if (!viewData.length) {
        box.innerHTML = '<div class="meta">没有符合条件的内容</div>';
        return;
      }
      let html = '';
      for (let i = 0; i < viewData.length; i++) {
        const x = viewData[i];
        html += '<div class="card" onclick="openLightbox(' + i + ')">' +
          '<img class="thumb" loading="lazy" data-file-id="' + x.id + '" data-fallback-src="' + esc(x.thumbnail || '') + '" src="' + transparentPixel() + '" alt="' + esc(x.name) + '">' +
          '<div class="body">' +
            '<div class="name">' + esc(x.name) + '</div>' +
            '<div class="chips">' +
              (x.software ? '<span class="chip">' + esc(x.software) + '</span>' : '') +
              (x.category ? '<span class="chip">' + esc(x.category) + '</span>' : '') +
            '</div>' +
            '<div class="prompt">' + esc(x.prompt || x.note || '') + '</div>' +
            '<div class="card-tools card-actions">' +
              '<button class="tool-btn" onclick="copyPromptFromCard(event,' + i + ')" title="复制提示词">📋 ' + Number(x.copies || 0) + '</button>' +
              '<button class="tool-btn" onclick="downloadFromCard(event,' + i + ')">⬇ 下载</button>' +
              '<button class="tool-btn" onclick="openFromCard(event,' + i + ')">👁 预览</button>' +
              '<button class="react-btn ' + (x.likedByMe ? 'on like' : '') + '" onclick="toggleLikeFromCard(event,' + i + ')">👍 ' + Number(x.likes || 0) + '</button>' +
              '<button class="react-btn ' + (x.favoritedByMe ? 'on fav' : '') + '" onclick="toggleFavFromCard(event,' + i + ')">⭐ ' + Number(x.favorites || 0) + '</button>' +
            '</div>' +
          '</div>' +
        '</div>';
      }
      box.innerHTML = html;
      hydrateThumbs();
    }

    function updateItemReactionById(fileId, payload) {
      for (let i = 0; i < allData.length; i++) {
        if (allData[i].id === fileId) {
          allData[i].likes = Number(payload.likes || 0);
          allData[i].favorites = Number(payload.favorites || 0);
          allData[i].likedByMe = !!payload.likedByMe;
          allData[i].favoritedByMe = !!payload.favoritedByMe;
          break;
        }
      }
    }

    function updateItemCopyById(fileId, payload) {
      for (let i = 0; i < allData.length; i++) {
        if (allData[i].id === fileId) {
          allData[i].copies = Number(payload.copies || 0);
          allData[i].copiedByMe = Number(payload.copiedByMe || 0);
          break;
        }
      }
    }

    function recordPromptCopy(item) {
      if (!item || !item.id || !SID || typeof google === 'undefined' || !google.script || !google.script.run) return;
      google.script.run.withSuccessHandler(function(raw){
        let resp = {};
        try { resp = JSON.parse(raw || '{}'); } catch (e) {}
        if (!resp.success) return;
        updateItemCopyById(item.id, resp);
        const opened = document.getElementById('lightbox').style.display === 'block';
        applyFilterSortRender();
        if (opened) {
          const newIndex = viewData.findIndex(x => x.id === item.id);
          if (newIndex >= 0) currentIndex = newIndex;
        }
        refreshLightboxReactionUI();
      }).recordCopy(item.id, userId, SID);
    }

    function sendToggleReaction(item, kind, toEnabled, onDone) {
      if (!SID) { showToast('未配置 sid，无法统计点赞收藏'); return; }
      google.script.run.withSuccessHandler(function(raw){
        let resp = {};
        try { resp = JSON.parse(raw || '{}'); } catch (e) {}
        if (!resp.success) { showToast(resp.error || '操作失败'); return; }
        updateItemReactionById(item.id, resp);
        if (typeof onDone === 'function') onDone();
      }).toggleReaction(item.id, userId, kind, toEnabled, SID);
    }
    function toggleLikeFromCard(ev, idx){ ev.stopPropagation(); const item = viewData[idx]; sendToggleReaction(item, 'like', !item.likedByMe, () => { applyFilterSortRender(); refreshLightboxReactionUI(); }); }
    function toggleFavFromCard(ev, idx){ ev.stopPropagation(); const item = viewData[idx]; sendToggleReaction(item, 'favorite', !item.favoritedByMe, () => { applyFilterSortRender(); refreshLightboxReactionUI(); }); }
    function copyPromptFromCard(ev, idx){ ev.stopPropagation(); const item = viewData[idx]; copyPromptText(item.prompt || '', item); }
    function downloadFromCard(ev, idx){ ev.stopPropagation(); const item = viewData[idx]; downloadItem(item); }
    function openFromCard(ev, idx){ ev.stopPropagation(); openLightbox(idx); }
    function toggleCurrentLike(ev){ ev.stopPropagation(); const item = current(); sendToggleReaction(item, 'like', !item.likedByMe, () => { applyFilterSortRender(); refreshLightboxReactionUI(); }); }
    function toggleCurrentFav(ev){ ev.stopPropagation(); const item = current(); sendToggleReaction(item, 'favorite', !item.favoritedByMe, () => { applyFilterSortRender(); refreshLightboxReactionUI(); }); }

    function refreshLightboxReactionUI() {
      const item = current();
      const lbLikeBtn = document.getElementById('lbLikeBtn');
      const lbFavBtn = document.getElementById('lbFavBtn');
      const lbCopyCount = document.getElementById('lbCopyCount');
      if (!lbLikeBtn || !lbFavBtn) return;
      lbLikeBtn.textContent = '👍 ' + Number(item.likes || 0);
      lbFavBtn.textContent = '⭐ ' + Number(item.favorites || 0);
      if (lbCopyCount) lbCopyCount.textContent = '复制 ' + Number(item.copies || 0);
      lbLikeBtn.className = 'react-btn' + (item.likedByMe ? ' on like' : '');
      lbFavBtn.className = 'react-btn' + (item.favoritedByMe ? ' on fav' : '');
    }

    function openLightbox(index) {
      if (index < 0 || index >= viewData.length) return;
      const firstOpen = document.getElementById('lightbox').style.display !== 'block';
      if (firstOpen) lastScrollY = window.scrollY || document.documentElement.scrollTop || document.body.scrollTop || 0;
      currentIndex = index;
      currentZoom = 1;
      const wrap = document.getElementById('lbWrap');
      if (firstOpen) {
        if (isEmbedded) {
          sideVisible = false;
          wrap.classList.add('hide-side');
        } else {
          sideVisible = true;
          wrap.classList.remove('hide-side');
        }
      } else {
        if (sideVisible) wrap.classList.remove('hide-side');
        else wrap.classList.add('hide-side');
      }

      const x = viewData[currentIndex];
      document.getElementById('lightbox').style.display = 'block';
      if (!isEmbedded) {
        document.documentElement.style.overflow = 'hidden';
        document.body.style.overflow = 'hidden';
      }

      const media = document.getElementById('lbMedia');
      if (x.type === 'video') {
        media.innerHTML = '<video class="lb-video" src="' + (x.preview || x.download || '') + '" controls autoplay></video>';
      } else {
        media.innerHTML = '<img id="lbMainImage" class="lb-image" src="' + transparentPixel() + '" alt="' + esc(x.name) + '">';
        const img = document.getElementById('lbMainImage');
        img.onwheel = function(ev) {
          ev.preventDefault();
          if (ev.deltaY < 0) zoomIn();
          else zoomOut();
        };
        getImageDataCached(x.id, 2400)
          .then((dataUri) => { img.src = dataUri || transparentPixel(); applyZoom(); })
          .catch(() => { img.src = x.preview || x.thumbnail || transparentPixel(); applyZoom(); });
      }

      document.getElementById('lbTitle').textContent = x.name || '';
      document.getElementById('lbPrompt').textContent = x.prompt || '（无）';
      document.getElementById('lbNote').textContent = x.note || '（无）';
      document.getElementById('lbSC').textContent = (x.software || '-') + ' / ' + (x.category || '-');
      document.getElementById('lbSource').innerHTML = x.sourceUrl ? '<a href="' + x.sourceUrl + '" target="_blank">' + esc(x.sourceUrl) + '</a>' : '（无）';
      document.getElementById('lbPath').textContent = x.folderPath || '';
      document.getElementById('lbDate').textContent = x.date ? new Date(x.date).toLocaleString() : '';
      refreshLightboxReactionUI();
      renderSimilarItems(x);
      applyZoom();
    }

    function similarityScore(base, item) {
      if (!base || !item || base.id === item.id) return 0;
      let score = 0;
      if (base.category && item.category && base.category === item.category) score += 6;
      if (base.software && item.software && base.software === item.software) score += 4;
      const basePath = String(base.folderPath || '').split('/').pop();
      const itemPath = String(item.folderPath || '').split('/').pop();
      if (basePath && itemPath && basePath === itemPath) score += 3;
      const baseText = String(base.prompt || base.note || '').toLowerCase();
      const itemText = String(item.prompt || item.note || '').toLowerCase();
      selectedTags.forEach(tag => {
        const t = String(tag || '').toLowerCase();
        if (t && itemText.indexOf(t) > -1) score += 2;
      });
      String(base.category || '').split(/[,\s，、]+/).forEach(token => {
        const t = token.toLowerCase();
        if (t && itemText.indexOf(t) > -1) score += 1;
      });
      return score;
    }

    function renderSimilarItems(base) {
      const box = document.getElementById('lbSimilar');
      if (!box) return;
      const items = allData
        .filter(x => x && x.id !== base.id)
        .map(x => ({ item: x, score: similarityScore(base, x) }))
        .filter(x => x.score > 0)
        .sort((a, b) => b.score - a.score || Number(b.item.date || 0) - Number(a.item.date || 0))
        .slice(0, 5)
        .map(x => x.item);

      if (!items.length) {
        box.innerHTML = '<div class="meta">暂无相似作品</div>';
        return;
      }

      box.innerHTML = items.map(item => {
        const idx = viewData.findIndex(x => x.id === item.id);
        const openIdx = idx >= 0 ? idx : -1;
        return '<div class="similar-item" onclick="openSimilarItem(\'' + escJs(item.id) + '\',' + openIdx + ')">' +
          '<img class="similar-thumb" data-sim-file-id="' + item.id + '" data-fallback-src="' + esc(item.thumbnail || '') + '" src="' + transparentPixel() + '" alt="' + esc(item.name || '') + '">' +
          '<div><div class="similar-name">' + esc(item.name || '') + '</div><div class="similar-meta">' + esc([item.software, item.category].filter(Boolean).join(' / ') || item.folderPath || '') + '</div></div>' +
        '</div>';
      }).join('');
      hydrateSimilarThumbs();
    }

    function hydrateSimilarThumbs() {
      document.querySelectorAll('img.similar-thumb[data-sim-file-id]').forEach(img => {
        const fileId = img.getAttribute('data-sim-file-id');
        const fallbackSrc = img.getAttribute('data-fallback-src') || '';
        getImageDataCached(fileId, 180)
          .then(dataUri => { img.src = dataUri || transparentPixel(); })
          .catch(() => { img.src = fallbackSrc || transparentPixel(); });
      });
    }

    function openSimilarItem(fileId, viewIndex) {
      if (viewIndex >= 0) {
        openLightbox(viewIndex);
        return;
      }
      const item = allData.find(x => x.id === fileId);
      if (!item) return;
      viewData = [item].concat(viewData.filter(x => x.id !== fileId));
      openLightbox(0);
    }

    function closeLightbox() {
      document.getElementById('lightbox').style.display = 'none';
      document.getElementById('lbMedia').innerHTML = '';
      document.documentElement.style.overflow = '';
      document.body.style.overflow = '';
      currentZoom = 1;
      sideVisible = !isEmbedded;
      requestAnimationFrame(function(){
        window.scrollTo(0, lastScrollY || 0);
      });
    }
    function nextItem(){ if (currentIndex < viewData.length - 1) openLightbox(currentIndex + 1); }
    function prevItem(){ if (currentIndex > 0) openLightbox(currentIndex - 1); }
    function current(){ return viewData[currentIndex] || {}; }

    function toggleSidePanel() {
      sideVisible = !sideVisible;
      const wrap = document.getElementById('lbWrap');
      if (sideVisible) wrap.classList.remove('hide-side');
      else wrap.classList.add('hide-side');
    }
    function applyZoom(){ const img = document.getElementById('lbMainImage'); if (img) img.style.transform = 'scale(' + currentZoom + ')'; }
    function zoomIn(){ currentZoom = Math.min(4, currentZoom + 0.15); applyZoom(); }
    function zoomOut(){ currentZoom = Math.max(0.4, currentZoom - 0.15); applyZoom(); }
    function zoomReset(){ currentZoom = 1; applyZoom(); }

    async function openRaw(){
      const x = current();
      if (!x || x.type === 'video') {
        if (x && x.driveUrl) window.open(x.driveUrl, '_blank');
        return;
      }
      try {
        const dataUri = await getImageDataCached(x.id, 0);
        const win = window.open('', '_blank');
        if (!win) return;
        win.document.write('<!doctype html><html><head><meta charset="utf-8"><title>' + esc(x.name || 'image') + '</title></head><body style="margin:0;background:#000;display:flex;align-items:center;justify-content:center"><img src="' + dataUri + '" style="max-width:100vw;max-height:100vh;object-fit:contain"></body></html>');
        win.document.close();
      } catch (_e) {
        showToast('打开原图失败');
      }
    }

    async function downloadItem(x){
      if (!x) return;
      if (x.type === 'video') {
        if (x.download) window.open(x.download, '_blank');
        return;
      }
      try {
        const dataUri = await getImageDataCached(x.id, 0);
        const a = document.createElement('a');
        a.href = dataUri;
        a.download = safeFileName(x.name, 'jpg');
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      } catch (_e) {
        showToast('下载失败');
      }
    }
    async function downloadRaw(){ await downloadItem(current()); }
    function openStandalone() {
      const params = new URLSearchParams();
      if (FID) params.set('fid', FID);
      if (SID) params.set('sid', SID);
      const theme = document.documentElement.getAttribute('data-theme') || 'light';
      params.set('theme', theme);
      const url = WEB_APP_URL ? (WEB_APP_URL + '?' + params.toString()) : window.location.href;
      window.open(url, '_blank');
    }

    async function copyPromptText(txt, item) {
      if (!txt) { showToast('当前没有可复制的提示词'); return; }
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(txt);
          recordPromptCopy(item);
          showToast('提示词已复制');
          return;
        }
        throw new Error('fallback');
      } catch (e) {
        try {
          const ta = document.createElement('textarea');
          ta.value = txt;
          ta.setAttribute('readonly', '');
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          const ok = document.execCommand('copy');
          document.body.removeChild(ta);
          if (ok) recordPromptCopy(item);
          showToast(ok ? '提示词已复制' : '复制失败，请手动复制');
        } catch (_err) {
          showToast('复制失败，请手动复制');
        }
      }
    }
    async function copyPrompt() { const item = current(); await copyPromptText(item.prompt || '', item); }

    document.getElementById('q').addEventListener('input', applyFilterSortRender);
    document.getElementById('sortKey').addEventListener('change', applyFilterSortRender);
    document.getElementById('sortDir').addEventListener('change', applyFilterSortRender);
    document.addEventListener('keydown', function(e){
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      const tagName = String(e.target && e.target.tagName || '').toLowerCase();
      if (tagName === 'input' || tagName === 'textarea' || tagName === 'select') return;
      const opened = document.getElementById('lightbox').style.display === 'block';
      const key = e.key.toLowerCase();
      if (!opened) {
        if (key === 't') { toggleTagBox(); e.preventDefault(); }
        if (key === 'r') { showRandomInspiration(); e.preventDefault(); }
        if (key === 'f') { setQuickFilter('favorites'); e.preventDefault(); }
        if (key === 'l') { setQuickFilter('liked'); e.preventDefault(); }
        return;
      }
      if (e.key === 'Escape') { closeLightbox(); e.preventDefault(); }
      if (e.key === 'ArrowRight') { nextItem(); e.preventDefault(); }
      if (e.key === 'ArrowLeft') { prevItem(); e.preventDefault(); }
      if (e.key === '+' || e.key === '=') { zoomIn(); e.preventDefault(); }
      if (e.key === '-') { zoomOut(); e.preventDefault(); }
      if (e.key === '0') { zoomReset(); e.preventDefault(); }
      if (key === 'i') { toggleSidePanel(); e.preventDefault(); }
      if (key === 'c') { copyPrompt(); e.preventDefault(); }
      if (key === 'l') { toggleCurrentLike(e); e.preventDefault(); }
      if (key === 'f') { toggleCurrentFav(e); e.preventDefault(); }
      if (key === 't') { toggleTagBox(); e.preventDefault(); }
    });

    loadData();
  </script>
</body>
</html>
